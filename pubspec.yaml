name: nutricare
description: AI-Powered Nutrition & Health App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.0.5
  speech_to_text: ^6.6.0
  image_picker: ^1.1.2
  url_launcher: ^6.0.0
  webview_flutter: ^4.0.0
  camera: ^0.11.0+2
  permission_handler: ^11.3.1
  geolocator: ^13.0.2
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  google_mlkit_face_detection: ^0.12.0
  google_mlkit_pose_detection: ^0.13.0
  supabase_flutter: ^2.12.0
  http: ^1.6.0
  web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
