[build]
  command = "git clone https://github.com/flutter/flutter.git --depth 1 -b stable \"$HOME/flutter\" || true && export PATH=\"$HOME/flutter/bin:$PATH\" && flutter pub get && flutter build web --release --dart-define=API_BASE_URL=$API_BASE_URL --dart-define=WEB_REDIRECT_URL=$WEB_REDIRECT_URL --dart-define=SUPABASE_URL=$SUPABASE_URL --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY"
  publish = "build/web"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
